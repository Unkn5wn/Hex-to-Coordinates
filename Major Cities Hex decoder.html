<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>City Lat/Long Hex Encoder</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #f6f9fa; }
    .container { max-width: 460px; margin: auto; background: #fff; padding: 32px 32px 17px 32px; border-radius: 12px; box-shadow: 0 2px 10px #bad2ea33;}
    label { font-weight: 500; display:block; margin-bottom: 9px;}
    select { width:100%; font-size:1.1em; padding: 7px 10px; border-radius:7px; border:1.5px solid #b0bdcd; margin-bottom:16px;}
    #result { margin-top: 22px; font-size: 1.21em; color: #266302; padding: 15px 12px; background: #e3fbe5; border-radius: 6px;}
    .coords { font-size: 1.07em; color: #314578;}
  </style>
</head>
<body>
<div class="container">
  <h2></h2> Cities: Hex Encoder</h2>
  <label for="citySelect">Choose a city:</label>
  <select id="citySelect" onchange="showHex()"></select>
  <div id="result"></div>
</div>
<script>
const cities = [
  // Format: [City, Latitude, N/S, Longitude, E/W]
  ["Tehran",       35.6892, "N", 51.3890, "E"],
  ["Mashhad",      36.2605, "N", 59.6168, "E"],
  ["Isfahan",      32.6546, "N", 51.6680, "E"],
  ["Karaj",        35.8327, "N", 50.9916, "E"],
  ["Shiraz",       29.5918, "N", 52.5837, "E"],
  ["Tabriz",       38.0962, "N", 46.2738, "E"],
  ["Qom",          34.6399, "N", 50.8759, "E"],
  ["Ahvaz",        31.3203, "N", 48.6691, "E"],
  ["Kermanshah",   34.3142, "N", 47.0650, "E"],
  ["Urmia",        37.5553, "N", 45.0725, "E"],
  ["Rasht",        37.2808, "N", 49.5832, "E"],
  ["Zahedan",      29.4963, "N", 60.8629, "E"],
  ["Hamadan",      34.7982, "N", 48.5150, "E"],
  ["Yazd",         31.8974, "N", 54.3569, "E"],
  ["Arak",         34.0917, "N", 49.6892, "E"],
  ["Ardabil",      38.2498, "N", 48.2933, "E"],
  ["Bandar Abbas", 27.1832, "N", 56.2666, "E"],
  ["Kerman",       30.2832, "N", 57.0788, "E"],
  ["Khorramabad",  33.4878, "N", 48.3558, "E"],
  ["Sanandaj",     35.3149, "N", 46.9988, "E"]
];
// Uses: 1 (N), 2 (S), 1 (E), 2 (W) -- change here if you want!
function getLatDirCode(latDir) { return latDir === 'N' ? '1' : '2'; }
function getLonDirCode(lonDir) { return lonDir === 'E' ? '1' : '2'; }
function firstDigit(num) { let n = '' + Math.abs(Math.trunc(num)); return n.length === 1 ? '0' : n[0]; }

function showHex() {
  const s = document.getElementById('citySelect');
  const i = s.selectedIndex;
  if (i < 0 || i >= cities.length) { document.getElementById('result').textContent = ""; return;}
  const [city, lat, latDir, lon, lonDir] = cities[i];
  const pos1 = getLatDirCode(latDir);
  const pos2 = firstDigit(lat);
  const pos3 = getLonDirCode(lonDir);
  const pos4 = firstDigit(lon);
  const hex = `0x${pos1}${pos2}${pos3}${pos4}`;
  document.getElementById('result').innerHTML =
    `<b>${city}</b><br><span class="coords">Latitude: ${lat}° ${latDir} <br>Longitude: ${lon}° ${lonDir}</span><br><br>`
    + `<b>Hex code:</b> <span style="font-size:1.11em;color:#4465ca;">${hex}</span>`;
}

// Build dropdown & show initial city
const sel = document.getElementById('citySelect');
for (let c of cities) {
  let opt = document.createElement("option");
  opt.value = c[0]; opt.textContent = c[0];
  sel.appendChild(opt);
}
showHex();
</script>
</body>
</html>
