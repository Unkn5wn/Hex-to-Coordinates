<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Multi-Coordinate Converter</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    :root {
      --brand: #4467bb;
      --bg: #f6f8fa;
      --card-bg: #fff;
      --border: #dde1ec;
      --accent: #62a3f8;
      --shadow: 0 2px 12px rgba(68,103,187,0.08);
      --radius: 12px;
      --danger: #ff5e6c;
      --success: #2cb869;
    }
    body {
      background: var(--bg);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", "Roboto", Arial, sans-serif;
      color: #2f3653;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      background: var(--card-bg);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      max-width: 680px;
      width: 98vw;
      padding: 2.2rem 2rem 2rem 2rem;
      margin: 2.5rem 0;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }
    .title {
      color: var(--brand);
      font-size: 2.0rem;
      font-weight: 700;
      letter-spacing: 1.2px;
      margin-bottom: 0.4em;
      text-align:center;
    }
    .desc {
      margin: 0 0 0.6em 0;
      font-size: 1.07em;
      color: #556198;
      text-align: center;
    }
    label {
      font-size: 1em;
      color: var(--brand);
      font-weight: 500;
      margin-bottom: 0.25em;
    }
    textarea {
      width: 100%; min-height: 80px; max-height:200px;
      font-size: 1.12em;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.75em 1.05em;
      background: #fbfbfd;
      outline:none;
      transition: border .22s;
      resize:vertical;
    }
    textarea:focus {
      border: 1.5px solid var(--accent);
      background: #f1f7fe;
    }
    button {
      background: var(--brand);
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      padding: 0.53em 1.25em;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 0.17em;
      margin-right: 0.45em;
      margin-bottom: 0.1em;
      box-shadow: 0 1px 4px rgba(68,103,187,0.06);
    }
    button:hover:not(:disabled) {
      background: var(--accent);
    }
    button:disabled {
      opacity:.52;
      cursor: not-allowed;
    }
    #notif {
      position: relative;
      display:inline-block;
      margin-bottom: 1.2em;
      width: 100%;
    }
    .toast {
      display: inline-block;
      padding: 0.66em 1.4em;
      border-radius: 7px;
      font-size: 1em;
      font-weight:600;
      background: var(--danger);
      color:#fff;
      margin-bottom:1em;
      box-shadow:0 1px 7px rgba(0,0,0,0.09);
      opacity:1;
      transition:opacity 0.25s;
      z-index:100;
      position: relative;
    }
    .toast.success {
      background: var(--success);
    }
    #downloadBtn {
      display:none;
      margin: 0.8em 0 0.5em 0;
      padding: 0.52em 3em;
      font-size: 1.08em;
      border-radius: 8px;
      letter-spacing: 0.05em;
    }
    table {
      border-collapse:collapse;
      width:100%;
      background: #fbfcff;
      border-radius: 7px;
      box-shadow:0 1px 4px rgba(68,103,187,0.07);
      font-size:1.01em;
      margin-bottom: 0.5em;
    }
    th, td {
      padding: 0.7em 0.6em;
      text-align:center;
    }
    th {
      background: #e7ecfc;
      color: var(--brand);
      border-bottom: 2px solid var(--border);
      font-weight: bold;
    }
    tr:nth-child(even) td {
      background: #f5f7fa;
    }
    .digits {
      color:#657bd1; font-size:1.19em; font-weight: 500; letter-spacing:.14em; white-space:nowrap;
    }
    .coord {
      font-size: 1.04em;
      font-weight: 600;
      color: #1e2d4d;
      letter-spacing: 0.15px;
      word-break: break-all;
    }
    .actions {
      display: flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
      gap:0.4em;
    }
    .error-cell {
      color: var(--danger);
      font-weight:600;
    }
    @media (max-width: 700px) {
      .container { padding: 1.15rem 0.1rem 1.15rem 0.1rem; }
      th, td { padding:0.5em 0.18em;}
      #downloadBtn { width:90vw; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Multi-Coordinate Converter</div>
    <div class="desc">
      Enter multiple 5-digit numbers (comma, space, or newline separated).<br>
      Get both N/E and S/W coordinates for each, copy, map, or download!
    </div>
    <div id="notif"></div>
    <form onsubmit="processMultipleInputs();return false;">
      <label for="codesArea">5-digit numbers:</label>
      <textarea id="codesArea" placeholder="Example:
30510
33645, 46780 30503"></textarea>
      <button type="submit">Convert All</button>
    </form>
    <button id="downloadBtn" onclick="downloadResults()" style="display:none;">Download Results</button>
    <div id="multiTableBox"></div>
  </div>
<script>
let lastTableRaw = []; // Store last processed results for download

function showToast(msg, isSuccess) {
    const notif = document.getElementById('notif');
    notif.innerHTML = `<div class="toast${isSuccess?' success':''}">${msg}</div>`;
    setTimeout(()=>{ notif.innerHTML = ""; }, 2000);
}

// Parse and normalize codes into 5-digit strings
function parseCodes(raw) {
    if (!raw) return [];
    // Split on commas, new lines, or spaces
    let arr = raw.trim().replace(/[^0-9,\s]/g,'').split(/[\s,]+/);
    return arr.filter(Boolean).map(c => c.trim());
}

// Calculate coordinates for a 5-digit string
function calcCoord(code) {
    if(!/^\d{5}$/.test(code)) return {valid:false, code};
    const [A,B,C,D,E] = code.split('');
    let east = Number(C + A);
    let north = parseInt(A + B, 10) + parseInt(D + E, 10);
    let formattedEast = east.toFixed(4) + "° E";
    let formattedNorth = north.toFixed(4) + "° N";
    let formattedInvertedEast = east.toFixed(4) + "° W";
    let formattedInvertedNorth = north.toFixed(4) + "° S";
    return {
        valid:true,
        code: code,
        east, north,
        formattedEast, formattedNorth,
        formattedInvertedEast, formattedInvertedNorth,
        copyText: `${formattedNorth}, ${formattedEast}`,
        copyInvertedText: `${formattedInvertedNorth}, ${formattedInvertedEast}`
    };
}
function copyCoordRow(type, idx) {
    const el = document.getElementById(type==="inv"?`copyInv${idx}`:`copy${idx}`);
    const text = (type==="inv"?el.dataset.copyinv:el.dataset.copy);
    navigator.clipboard.writeText(text).then(()=>{
        showToast("Copied: "+text,true);
    });
}
function mapCoordRow(type, idx) {
    const el = document.getElementById(type==="inv"?`mapInv${idx}`:`map${idx}`);
    const lat = (type==="inv"?-1:1)*parseFloat(el.dataset.lat);
    const lng = (type==="inv"?-1:1)*parseFloat(el.dataset.lng);
    const url = `https://www.google.com/maps?q=${lat.toFixed(4)},${lng.toFixed(4)}`;
    window.open(url, "_blank");
}

function processMultipleInputs() {
    const raw = document.getElementById('codesArea').value;
    const box = document.getElementById('multiTableBox');
    box.innerHTML = "";
    let codes = parseCodes(raw);
    let downloadBtn = document.getElementById('downloadBtn');
    lastTableRaw = [];
    downloadBtn.style.display = "none";

    if(codes.length === 0) {
        showToast('Please enter one or more 5-digit codes.', false);
        return;
    }
    let table = `<table>
        <tr>
            <th>#</th>
            <th>Digits</th>
            <th>Original<br>(N, E)</th>
            <th>Actions</th>
            <th>Inverted<br>(S, W)</th>
            <th>Actions</th>
        </tr>`;
    let anyInvalid = false;
    let anyValid = false;
    let tableraw = [];
    codes.forEach((code,i) => {
        const c = calcCoord(code);
        let tableRowObj = {idx:i+1, code: code};
        table += `<tr>`;
        table += `<td>${i+1}</td>`;
        if(!c.valid) {
            table += `<td colspan="5" class="error-cell">Invalid code: ${code}</td>`;
            anyInvalid = true;
            tableRowObj.err = true;
        } else {
            anyValid = true;
            table += `<td class="digits">${c.code}</td>`;
            table += `<td class="coord">${c.formattedNorth}<br>${c.formattedEast}</td>`;
            table += `<td class="actions">
                <button id="copy${i}" data-copy="${c.copyText}" onclick="copyCoordRow('orig',${i})">Copy</button>
                <button id="map${i}" data-lat="${c.north}" data-lng="${c.east}" onclick="mapCoordRow('orig',${i})">Map</button>
                </td>`;
            table += `<td class="coord">${c.formattedInvertedNorth}<br>${c.formattedInvertedEast}</td>`;
            table += `<td class="actions">
                <button id="copyInv${i}" data-copyinv="${c.copyInvertedText}" onclick="copyCoordRow('inv',${i})">Copy</button>
                <button id="mapInv${i}" data-lat="${c.north}" data-lng="${c.east}" onclick="mapCoordRow('inv',${i})">Map</button>
                </td>`;
            tableRowObj.err = false;
            tableRowObj.orig = `${c.formattedNorth}, ${c.formattedEast}`;
            tableRowObj.inv = `${c.formattedInvertedNorth}, ${c.formattedInvertedEast}`;
        }
        tableraw.push(tableRowObj);
        table += `</tr>`;
    });
    table += `</table>`;
    box.innerHTML = table;
    lastTableRaw = tableraw;
    if(anyInvalid) {
        showToast(`Some codes are invalid. Only valid 5-digit numbers are processed.`, false);
    } else {
        showToast(`Converted ${codes.length} code${codes.length>1?'s':''} successfully!`, true);
    }
    // Show download button if there's at least one valid coordinate
    downloadBtn.style.display = (anyValid ? "block" : "none");
}

function downloadResults() {
    if (!lastTableRaw || lastTableRaw.length === 0) {
        showToast("No data to download.", false);
        return;
    }
    let lines = [];
    lines.push("Multi-Coordinate Conversion Results");
    lines.push("==================================");
    lines.push("Digits    | Original (N,E)            | Inverted (S,W)");
    lines.push("----------|---------------------------|---------------------------");
    lastTableRaw.forEach(row => {
        if(row.err) {
            lines.push(`${row.code.padEnd(10,' ')}| [Invalid code]`);
        } else {
            lines.push(
`${row.code.padEnd(10,' ')}| ${row.orig.padEnd(25,' ')} | ${row.inv}`);
        }
    });
    let txt = lines.join('\r\n');
    // Initiate download
    let blob = new Blob([txt], {type: 'text/plain'});
    let link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'coordinates.txt';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast("Downloaded results as coordinates.txt", true);
}
</script>
</body>
</html>
